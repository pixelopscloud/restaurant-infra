apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: restaurant-app-order-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3003
          env:
            - name: MONGO_URI
              value: mongodb://mongodb:27017/restaurant

---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  selector:
    app: order-service
  ports:
    - port: 3003
      targetPort: 3003
